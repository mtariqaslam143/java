<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local drazz saller</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div id="container">
        <h1 class="text-primary px-4 py-4 bm-3 text-center fw-semibold">Local Daraz Saller</h1>
        <!--card-->
        <div class="card p-3 mb-4 w-50 mx-auto">
            <!--p name-->
            <div class="mb-3">
            <label class="form-label">product name?</label>
            <input type="text" id="name" class="form-control">
            </div>
            <!--prices-->
          <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" id="price" class="form-control">
          </div>        
          <!--category-->
          <div class="mb-3">
            <label class="form-label">category</label>
            <select class="form-select" id="category">
            <option>clothing</option>
            <option>food</option>
            <option>daraz</option>
            </select>
          </div>
          <!--button-->
          <button class="rounded btn btn-success hovr:success-600" id="addBtn">add item</button>
          <!--table header-->
          <table class="table table-bordered bg-white mt-3 rounded table-hover">
            <thead class="table-success text-center ">
                <tr>
                    <th>Name</th>
                    <th>Prices</th>
                    <th>Category</th>
                </tr>
            </thead>
            <tbody id="tablebody"></tbody>
          </table>

    </div>
    <script>
        //=====class====
        class product{
            constructor (name, price, category){
                this.name = name;
                this.price = price;
                this.category = category;
            }

        }

        //======data array======
        let inventory = JSON.parse(localStorage.getItem("products")) || [];
        //====table render function=======
        function renderTable(){
            let tbody = document.getElementById("tablebody");tbody.innerHTML = "";

            inventory.forEach(product => {
                //row
                let tr = document.createElement("tr");
                //name
                let td1 = document.createElement("td");
                td1.textContent = product.name;
                //price
                let td2 = document.createElement("td");
                td2.textContent = product.price;;
                //category
                let td3 = document.createElement("td");
                td3.textContent = product.category;
                //append
                tr.appendChild(td1);
                tr.appendChild(td2);
                tr.appendChild(td3);
                tbody.appendChild(tr);

            });
        }
        //====add item ====
        document.getElementById("addBtn").addEventListener("click", () => {

            let name = document.getElementById("name").value;
            let price = document.getElementById("price").value;
            let category = document.getElementById("category").value;
            if(name == "" || price == ""){
            alert("fill all fields");
            return;
            }
            //create object
            let newproduct = new product(name,price,category);
            //save to array
            inventory.push(newproduct);
            //save into localstorage
            localStorage.setItem("products", JSON.stringify(inventory));
            renderTable();
        });
        renderTable();
        
    </script>
    
</body>
</html>
